<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f1419">
<title>SAYO — 매수 시그널 모니터</title>

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180.png">
<link rel="apple-touch-icon" sizes="167x167" href="/apple-touch-icon-167.png">
<link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152.png">
<link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAYO">

<style>
/* ============================================================
   디자인 토큰 — Bloomberg-lite for retail
   ============================================================ */
:root {
  /* 배경 — 진한 차콜 톤 */
  --bg-0: #0a0e13;
  --bg-1: #0f1419;
  --bg-2: #161c23;
  --bg-3: #1d242d;
  --bg-4: #252d38;

  /* 텍스트 */
  --fg-1: #e6edf3;
  --fg-2: #b8c1cc;
  --fg-3: #7d8896;
  --fg-4: #4a5462;

  /* 보더 */
  --border-1: #1f2832;
  --border-2: #2a3441;

  /* 시그널 컬러 */
  --signal-strong: #00d68f;        /* 🟢🟢 강력 매수 */
  --signal-strong-glow: rgba(0, 214, 143, 0.18);
  --signal-candidate: #5ad28c;     /* 🟢 매수 후보 */
  --signal-candidate-glow: rgba(90, 210, 140, 0.12);
  --signal-now: #ff5454;           /* 🚨 지금 매수! */
  --signal-now-glow: rgba(255, 84, 84, 0.20);
  --signal-crisis: #ff3838;        /* 🚨 위기 */
  --signal-crisis-glow: rgba(255, 56, 56, 0.18);
  --signal-warn: #ffb84d;          /* 🟡 주의 */
  --signal-watch: #ff8c42;         /* 🟠 관찰 */
  --signal-info: #5cb3ff;          /* 🔵 정보 */

  /* 추세 컬러 */
  --trend-up-strong: #00d68f;
  --trend-up: #5ad28c;
  --trend-flat: #7d8896;
  --trend-down: #ff8c42;
  --trend-down-strong: #ff3838;

  /* 매크로 컬러 */
  --macro-good: #00d68f;
  --macro-warn: #ffb84d;
  --macro-bad: #ff5454;

  /* 강조 */
  --accent: #4dabff;

  /* 폰트 */
  --font-mono: 'SF Mono', 'JetBrains Mono', 'Roboto Mono', 'Menlo', Consolas, monospace;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
}

/* ============================================================
   리셋 + 기본
   ============================================================ */
* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-0);
  color: var(--fg-1);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.45;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  padding-bottom: env(safe-area-inset-bottom, 0);
  padding-top: env(safe-area-inset-top, 0);
}

a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

button {
  font-family: inherit;
  cursor: pointer;
  background: none;
  border: none;
  color: inherit;
}

/* 모노 폰트 적용 (숫자) */
.mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }

/* ============================================================
   레이아웃 컨테이너
   ============================================================ */
.app {
  max-width: 1280px;
  margin: 0 auto;
  padding: 16px;
}

@media (max-width: 768px) {
  .app { padding: 12px; }
}

/* ============================================================
   상단 헤더
   ============================================================ */
.app-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 16px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border-1);
}

.app-title {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.02em;
  color: var(--fg-1);
}

.app-title .accent {
  color: var(--signal-candidate);
}

.app-meta {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
  text-align: right;
}

.app-meta .updated-time {
  color: var(--fg-2);
}

/* ============================================================
   매크로 카드 (3개)
   ============================================================ */
.macro-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 20px;
}

@media (max-width: 600px) {
  .macro-grid {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .macro-card.span-2 { grid-column: span 2; }
}

.macro-card {
  background: var(--bg-1);
  border: 1px solid var(--border-1);
  border-radius: 8px;
  padding: 14px 16px;
  position: relative;
  transition: border-color .2s;
}

.macro-card.alert {
  border-color: var(--signal-warn);
}

.macro-card.crisis {
  border-color: var(--signal-now);
  background: linear-gradient(135deg, var(--bg-1), rgba(255, 84, 84, 0.04));
}

.macro-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  color: var(--fg-3);
  text-transform: uppercase;
  margin-bottom: 6px;
}

.macro-value {
  font-family: var(--font-mono);
  font-size: 22px;
  font-weight: 700;
  color: var(--fg-1);
  line-height: 1.1;
  margin-bottom: 2px;
}

.macro-sub {
  font-family: var(--font-mono);
  font-size: 11px;
  color: var(--fg-3);
}

.macro-badge {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 3px 7px;
  border-radius: 3px;
  background: var(--bg-3);
  color: var(--fg-2);
}

.macro-badge.good { background: rgba(0, 214, 143, 0.15); color: var(--macro-good); }
.macro-badge.warn { background: rgba(255, 184, 77, 0.15); color: var(--macro-warn); }
.macro-badge.bad { background: rgba(255, 84, 84, 0.18); color: var(--macro-bad); }

/* VIX 게이지 미니 */
.vix-gauge {
  margin-top: 6px;
  height: 4px;
  background: var(--bg-3);
  border-radius: 2px;
  position: relative;
  overflow: hidden;
}
.vix-gauge .marker {
  position: absolute;
  top: 0;
  bottom: 0;
  width: 2px;
  background: var(--fg-1);
  transition: left .4s ease;
}
.vix-gauge .zone {
  position: absolute;
  top: 0;
  bottom: 0;
}
.vix-gauge .zone.normal { background: rgba(0, 214, 143, 0.25); left: 0; width: 50%; }
.vix-gauge .zone.warn   { background: rgba(255, 184, 77, 0.25); left: 50%; width: 20%; }
.vix-gauge .zone.bad    { background: rgba(255, 84, 84, 0.25); left: 70%; width: 30%; }

/* MA 편차 표시 */
.ma-bar {
  margin-top: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: var(--font-mono);
  font-size: 11px;
}
.ma-bar .arrow.up { color: var(--macro-good); }
.ma-bar .arrow.down { color: var(--macro-bad); }

/* ============================================================
   시장 모드 헤더
   ============================================================ */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin: 24px 0 8px;
  padding: 0 4px;
}

.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--fg-1);
  letter-spacing: -0.01em;
}

.mode-tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  padding: 3px 8px;
  border-radius: 3px;
  text-transform: uppercase;
  font-weight: 700;
}
.mode-tag.normal { background: rgba(0, 214, 143, 0.15); color: var(--macro-good); }
.mode-tag.adjust { background: rgba(255, 184, 77, 0.15); color: var(--macro-warn); }
.mode-tag.caution { background: rgba(255, 140, 66, 0.18); color: var(--signal-watch); }
.mode-tag.panic { background: rgba(255, 84, 84, 0.20); color: var(--macro-bad); }

/* ============================================================
   종목 테이블 (데스크톱)
   ============================================================ */
.stock-table {
  background: var(--bg-1);
  border: 1px solid var(--border-1);
  border-radius: 8px;
  overflow: hidden;
}

.stock-row {
  display: grid;
  grid-template-columns: 4px 2.4fr 1fr 0.9fr 0.9fr 1.4fr 1.4fr 0.9fr;
  align-items: center;
  padding: 10px 14px 10px 0;
  border-bottom: 1px solid var(--border-1);
  position: relative;
  cursor: pointer;
  transition: background .15s;
}
.stock-row:last-child { border-bottom: none; }
.stock-row:hover { background: var(--bg-2); }
.stock-row.expanded { background: var(--bg-2); }

/* 좌측 컬러 바 (시그널) */
.row-bar {
  width: 4px;
  height: 100%;
  min-height: 36px;
  background: transparent;
}
.stock-row.signal-strong .row-bar { background: var(--signal-strong); }
.stock-row.signal-candidate .row-bar { background: var(--signal-candidate); }
.stock-row.signal-now .row-bar { background: var(--signal-now); }
.stock-row.signal-crisis .row-bar { background: var(--signal-crisis); }
.stock-row.signal-warn .row-bar { background: var(--signal-warn); }
.stock-row.signal-watch .row-bar { background: var(--signal-watch); }
.stock-row.signal-info .row-bar { background: var(--signal-info); }

/* 시그널 글로우 (살짝) */
.stock-row.signal-strong { box-shadow: inset 0 0 0 1px var(--signal-strong-glow); }
.stock-row.signal-now { box-shadow: inset 0 0 16px var(--signal-now-glow); }
.stock-row.signal-crisis { box-shadow: inset 0 0 16px var(--signal-crisis-glow); }

/* 컬럼별 */
.col-name {
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-left: 12px;
  min-width: 0;
}
.col-name .name {
  font-weight: 600;
  font-size: 14px;
  color: var(--fg-1);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.col-name .meta {
  font-size: 11px;
  color: var(--fg-4);
  font-family: var(--font-mono);
}
.col-name .badges {
  display: flex;
  gap: 4px;
  margin-top: 2px;
}

.col-numeric {
  font-family: var(--font-mono);
  font-size: 13px;
  text-align: right;
  padding-right: 8px;
  color: var(--fg-2);
}
.col-numeric.primary { color: var(--fg-1); font-weight: 600; }
.col-numeric .label {
  display: block;
  font-size: 9px;
  color: var(--fg-4);
  letter-spacing: 0.05em;
  text-transform: uppercase;
  margin-bottom: 1px;
}

/* 추세 셀 */
.col-trend {
  font-family: var(--font-mono);
  font-size: 12px;
  text-align: right;
  padding-right: 8px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}
.col-trend .label {
  font-size: 9px;
  color: var(--fg-4);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.col-trend .value {
  display: flex;
  align-items: center;
  gap: 4px;
  font-weight: 600;
}
.col-trend .arrow.up-strong { color: var(--trend-up-strong); }
.col-trend .arrow.up { color: var(--trend-up); }
.col-trend .arrow.flat { color: var(--trend-flat); }
.col-trend .arrow.down { color: var(--trend-down); }
.col-trend .arrow.down-strong { color: var(--trend-down-strong); }

/* 시그널 뱃지 (소형) */
.badge {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.04em;
  padding: 2px 5px;
  border-radius: 3px;
  text-transform: uppercase;
  white-space: nowrap;
}
.badge.candidate { background: rgba(90, 210, 140, 0.16); color: var(--signal-candidate); }
.badge.strong { background: rgba(0, 214, 143, 0.20); color: var(--signal-strong); }
.badge.now { background: rgba(255, 84, 84, 0.22); color: var(--signal-now); }
.badge.crisis { background: rgba(255, 56, 56, 0.22); color: var(--signal-crisis); }
.badge.warn { background: rgba(255, 184, 77, 0.18); color: var(--signal-warn); }
.badge.watch { background: rgba(255, 140, 66, 0.20); color: var(--signal-watch); }
.badge.info { background: rgba(92, 179, 255, 0.18); color: var(--signal-info); }

/* 표 헤더 (선택적) */
.stock-table-header {
  display: grid;
  grid-template-columns: 4px 2.4fr 1fr 0.9fr 0.9fr 1.4fr 1.4fr 0.9fr;
  padding: 10px 14px 10px 0;
  font-size: 10px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--fg-4);
  background: var(--bg-2);
  border-bottom: 1px solid var(--border-2);
  font-weight: 600;
}
.stock-table-header > div { padding-right: 8px; text-align: right; }
.stock-table-header .col-name { padding-left: 16px; text-align: left; }

/* ============================================================
   확장 영역 (탭 시 펼침)
   ============================================================ */
.row-detail {
  grid-column: 1 / -1;
  margin-top: 10px;
  padding: 12px 16px;
  background: var(--bg-3);
  border-radius: 6px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--fg-2);
  display: none;
  border: 1px solid var(--border-2);
}
.stock-row.expanded .row-detail {
  display: block;
}

.detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 8px 16px;
  margin-bottom: 10px;
}
.detail-item .key {
  font-size: 10px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--fg-4);
  margin-bottom: 2px;
}
.detail-item .val { color: var(--fg-1); font-weight: 600; }

.detail-reasons {
  font-size: 11px;
  color: var(--fg-3);
  padding-top: 8px;
  border-top: 1px solid var(--border-2);
}
.detail-reasons .reason-tag {
  display: inline-block;
  margin: 2px 4px 2px 0;
  padding: 2px 6px;
  background: var(--bg-4);
  border-radius: 3px;
}

/* ============================================================
   모바일 카드 변환
   ============================================================ */
@media (max-width: 640px) {
  .stock-table-header { display: none; }
  
  .stock-row {
    grid-template-columns: 4px 1fr;
    grid-template-rows: auto auto;
    gap: 4px 0;
    padding: 12px 14px 12px 0;
  }
  
  .row-bar {
    grid-row: 1 / 3;
  }
  
  .col-name {
    grid-column: 2;
    grid-row: 1;
  }
  
  .col-numeric, .col-trend {
    grid-column: 2;
    text-align: left;
    padding: 0 12px 0 12px;
  }
  
  /* 모바일은 압축: rsi + peg + 두 추세만 한 줄에 */
  .stock-row .col-numeric:nth-of-type(1),
  .stock-row .col-numeric:nth-of-type(2),
  .stock-row .col-trend:nth-of-type(1),
  .stock-row .col-trend:nth-of-type(2),
  .stock-row .col-numeric:nth-of-type(3) {
    grid-column: 2;
    grid-row: 2;
    display: inline-flex;
    flex-direction: row;
    align-items: baseline;
    gap: 4px;
    padding: 0;
    margin: 0 12px 0 12px;
    font-size: 12px;
  }
  
  .col-numeric .label, .col-trend .label {
    display: inline;
    margin-right: 2px;
  }
  
  /* 모바일에선 가로 스크롤 영역으로 */
  .stock-row {
    overflow: visible;
  }
}

/* ============================================================
   빈 상태 / 로딩
   ============================================================ */
.empty-state {
  padding: 32px 16px;
  text-align: center;
  color: var(--fg-4);
  font-size: 13px;
}

.loading-pulse {
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 0.5; }
  50% { opacity: 1; }
}

/* ============================================================
   푸터
   ============================================================ */
.app-footer {
  margin-top: 32px;
  padding: 16px 4px;
  border-top: 1px solid var(--border-1);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--fg-4);
  font-family: var(--font-mono);
}

.app-footer .links a {
  color: var(--fg-3);
  margin-left: 12px;
}

/* 토큰 등록 버튼 */
.btn-subscribe {
  font-size: 11px;
  letter-spacing: 0.04em;
  padding: 5px 10px;
  background: var(--bg-3);
  color: var(--fg-2);
  border: 1px solid var(--border-2);
  border-radius: 4px;
  text-transform: uppercase;
  font-weight: 600;
  transition: all .15s;
}
.btn-subscribe:hover { background: var(--bg-4); color: var(--fg-1); border-color: var(--border-2); }
.btn-subscribe.active { background: rgba(0, 214, 143, 0.15); color: var(--signal-strong); border-color: var(--signal-strong); }
/* ============================================================
   라벨 가시성 — 데스크톱은 헤더로 충분 / 모바일만 행 라벨 표시
   ============================================================ */
   @media (min-width: 641px) {
  .stock-row .col-numeric .label,
  .stock-row .col-trend .label {
    display: none;
  }
}

/* ============================================================
   컬러바 강화
   ============================================================ */
.stock-row {
  border-left: 0;
  position: relative;
}
.row-bar {
  display: none; /* 별도 div 대신 left border로 처리 */
}
.stock-row.signal-strong { border-left: 4px solid var(--signal-strong); }
.stock-row.signal-candidate { border-left: 4px solid var(--signal-candidate); }
.stock-row.signal-now { border-left: 4px solid var(--signal-now); }
.stock-row.signal-crisis { border-left: 4px solid var(--signal-crisis); }
.stock-row.signal-warn { border-left: 4px solid var(--signal-warn); }
.stock-row.signal-watch { border-left: 4px solid var(--signal-watch); }
.stock-row.signal-info { border-left: 4px solid var(--signal-info); }

/* 컬러바 없는 평상시 행도 동일 폭으로 정렬 맞춤 */
.stock-row:not([class*="signal-"]) {
  border-left: 4px solid transparent;
}

/* 그리드 첫 칸(row-bar)이 사라지므로 grid 재조정 */
.stock-table-header,
.stock-row {
  grid-template-columns: 2.4fr 1fr 0.9fr 0.9fr 1.4fr 1.4fr 0.9fr;
}

/* 모바일은 다시 2열 */
@media (max-width: 640px) {
  .stock-table-header,
  .stock-row {
    grid-template-columns: 1fr;
  }
}
/* 모바일 행 — 라벨 가독성 좋게 */
@media (max-width: 640px) {
  .stock-row .col-numeric,
  .stock-row .col-trend {
    display: flex;
    justify-content: space-between;
    padding: 2px 16px !important;
    font-size: 12px;
  }
  .stock-row .col-numeric .label,
  .stock-row .col-trend .label {
    display: inline !important;
    color: var(--fg-4);
    font-weight: 500;
    margin-right: 8px;
  }
  .stock-row .col-name {
    padding: 0 16px;
    margin-bottom: 4px;
  }
}
</style>

</head>
<body>
    <div class="app">

        <!-- ============================================================
             헤더
             ============================================================ -->
        <header class="app-header">
          <div class="app-title">SAYO</div>
          <div class="app-meta">
            <div class="updated-time" id="updated-time">— —</div>
            <button class="btn-subscribe" id="btn-subscribe">알림 등록</button>
          </div>
        </header>
      
        <!-- ============================================================
             매크로 카드 3개
             ============================================================ -->
        <section class="macro-grid">
      
          <!-- VIX -->
          <div class="macro-card" id="macro-vix">
            <div class="macro-label">VIX</div>
            <div class="macro-value mono" id="vix-value">—</div>
            <div class="macro-sub mono" id="vix-sub">5일 평균 —</div>
            <div class="vix-gauge">
              <div class="zone normal"></div>
              <div class="zone warn"></div>
              <div class="zone bad"></div>
              <div class="marker" id="vix-marker"></div>
            </div>
            <span class="macro-badge" id="vix-badge">—</span>
          </div>
      
          <!-- QQQ -->

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    const firebaseConfig = {

    // ============================================================

    const $ = (sel) => document.querySelector(sel);
    
    function fmt(val, opts = {}) {
      if (val === null || val === undefined || val === "") return "—";
      if (typeof val === "number") {
        if (Number.isNaN(val)) return "—";
        if (opts.percent) return (val >= 0 ? "+" : "") + val.toFixed(1) + "%";
        if (opts.price && val >= 1000) return val.toLocaleString();
        if (opts.decimals !== undefined) return val.toFixed(opts.decimals);
        return val.toLocaleString();
      }
      return String(val);
    }
    
    function fmtPrice(price, region) {
      if (price === null || price === undefined) return "—";
      if (region === "us") return "$" + price.toLocaleString(undefined, { maximumFractionDigits: 2 });
      return price.toLocaleString();
    }
    
    // 추세 상태 → 화살표/클래스
    function trendIcon(state, slope) {
      const slopeStr = (slope !== null && slope !== undefined) 
        ? (slope >= 0 ? "+" : "") + slope.toFixed(1) + "%" 
        : "—";
      
      switch (state) {
        case "accelerating":
          return { arrow: "↑↑", cls: "up-strong", value: slopeStr };
        case "decelerating":
          return { arrow: "↑", cls: "up", value: slopeStr };
        case "reversing":
          return { arrow: "↓", cls: "down", value: slopeStr };
        case "declining":
          return { arrow: "↓↓", cls: "down-strong", value: slopeStr };
        default:
      return { arrow: "·", cls: "flat", value: "수집 중" };
     }
    }
    
    // 시그널 우선순위 → 행 클래스 + 뱃지
    function getSignalInfo(stock) {
      const triggers = stock.crisis_triggers || [];
      const buyLevel = stock.buy_level || "none";
      const infoLevel = stock.info_level;
      
      const badges = [];
      let rowClass = "";
      
      // 위기 (최고 우선순위)
      if (triggers.includes("company_crisis") || triggers.includes("market_panic")) {
        rowClass = "signal-crisis";
        badges.push({ label: "🚨 위기", cls: "crisis" });
      }
      // 매수 시그널
      else if (buyLevel === "strong") {
        rowClass = "signal-strong";
        badges.push({ label: "💪 강력 매수", cls: "strong" });
      }
      else if (buyLevel === "candidate") {
        rowClass = "signal-candidate";
        badges.push({ label: "🟢 매수 후보", cls: "candidate" });
      }
      // 정보성 (뱃지로만 표시, 행 색상은 안 바꿈)
      if (infoLevel === "info_watch") {
        if (!rowClass) rowClass = "signal-watch";
        badges.push({ label: "관찰", cls: "watch" });
      } else if (infoLevel === "info_warn") {
        if (!rowClass) rowClass = "signal-warn";
        badges.push({ label: "주의", cls: "warn" });
      } else if (infoLevel === "info_mild") {
        badges.push({ label: "정보", cls: "info" });
      }
      
      return { rowClass, badges };
    }
    
    // ============================================================

    function renderMacro(d) {

        const card = $("#macro-vix");
        const badge = $("#vix-badge");
        card.classList.remove("alert", "crisis");
        badge.classList.remove("good", "warn", "bad");
        if (vix.mode === "level2") {
          card.classList.add("crisis");
          badge.classList.add("bad");
          badge.textContent = "🔴 공포";
        } else if (vix.mode === "level1") {
          card.classList.add("alert");
          badge.classList.add("warn");
          badge.textContent = "🟠 경계";
        } else {
          badge.classList.add("good");
          badge.textContent = "🟢 평온";
        }
        
        // VIX 게이지 마커 (0~50 스케일)
        const pct = Math.min(Math.max(vix.current / 50, 0), 1);
        $("#vix-marker").style.left = (pct * 100) + "%";
      }
      
      // QQQ
      if (qqq.price !== undefined) {
        $("#qqq-value").textContent = "$" + qqq.price.toLocaleString();

          badge.textContent = "MA↑";
        } else {
          badge.classList.add("bad");
          badge.textContent = "MA↓";
        }

      // 시장 모드 태그
      const modeUs = d.market_mode_us || d.market_mode || "normal";
      const modeKr = d.market_mode_kr || "normal";

      // 업데이트 시각
      if (d.updated) {
        $("#updated-time").textContent = d.updated;
      }
    }
    
    // ============================================================
    // 종목 행 렌더 — 미국 / 한국 주식
    // ============================================================
    function renderStockRow(stock, region) {
      const { rowClass, badges } = getSignalInfo(stock);
      
      const epsTrend = trendIcon(stock.eps_trend_state, stock.trend_slope_mom_pct);
      const targetTrend = trendIcon(stock.target_trend_state, stock.target_slope_mom_pct);
      
      const rsi = stock.rsi !== null && stock.rsi !== undefined ? stock.rsi.toFixed(1) : "—";

      const surprise = stock.earnings_surprise_pct !== null && stock.earnings_surprise_pct !== undefined 
        ? (stock.earnings_surprise_pct >= 0 ? "+" : "") + stock.earnings_surprise_pct.toFixed(1) + "%" 
        : "—";

        ? (stock.rev_growth >= 0 ? "+" : "") + stock.rev_growth.toFixed(1) + "%" 
        : "—";
      
      const lastCol = region === "us" ? surprise : revGrowth;
      
      const badgesHtml = badges.map(b => `<span class="badge ${b.cls}">${b.label}</span>`).join("");
      
      // 상세 영역 (탭 시 펼침)
      const detailItems = [
        { key: "PER fwd", val: fmt(stock.per_fwd, { decimals: 2 }) },
        { key: "PBR", val: fmt(stock.pbr, { decimals: 2 }) },
        { key: "PS", val: fmt(stock.ps, { decimals: 2 }) },
        { key: "52주 위치", val: fmt(stock.band_pct, { percent: false, decimals: 1 }) + (stock.band_pct !== null && stock.band_pct !== undefined ? "%" : "") },
        { key: "거래량비", val: fmt(stock.vol_ratio, { decimals: 2 }) + "x" },
        { key: "목표갭", val: stock.target_gap !== null && stock.target_gap !== undefined ? (stock.target_gap >= 0 ? "+" : "") + stock.target_gap.toFixed(1) + "%" : "—" },
        { key: "EPS 1W", val: stock.trend_slope_wow_pct !== null && stock.trend_slope_wow_pct !== undefined ? (stock.trend_slope_wow_pct >= 0 ? "+" : "") + stock.trend_slope_wow_pct.toFixed(1) + "%" : "—" },
        { key: "EPS Raw", val: stock.trend_raw_change_pct !== null && stock.trend_raw_change_pct !== undefined ? (stock.trend_raw_change_pct >= 0 ? "+" : "") + stock.trend_raw_change_pct.toFixed(2) + "%" : "—" },
        { key: "RSI 임계", val: fmt(stock.rsi_threshold) },
        { key: "Hits", val: (stock.selection_hits || 0) + "/3" },
      ];
      
      const detailItemsHtml = detailItems.map(item => 
        `<div class="detail-item"><div class="key">${item.key}</div><div class="val mono">${item.val}</div></div>`
      ).join("");
      
      // 위기/정보성 사유 표시
      const reasons = [];
      (stock.crisis_details || []).forEach(d => reasons.push(`<span class="reason-tag">${d}</span>`));
      (stock.info_reasons || []).forEach(d => reasons.push(`<span class="reason-tag">${d}</span>`));
      if (stock.skip_reason) reasons.push(`<span class="reason-tag">${stock.skip_reason}</span>`);
      const reasonsHtml = reasons.length > 0 ? `<div class="detail-reasons">${reasons.join(" ")}</div>` : "";
      
      return `
         <div class="stock-row ${rowClass}" data-code="${stock.code}">
            <div class="col-name">
            <div class="name">${stock.name || stock.code}</div>
            <div class="meta">${stock.code} · ${stock.sector || ""}</div>
            ${badgesHtml ? `<div class="badges">${badgesHtml}</div>` : ""}
          </div>
          <div class="col-numeric primary"><span class="label">RSI</span>${rsi}</div>
          <div class="col-numeric"><span class="label">PEG</span>${peg}</div>
          <div class="col-numeric"><span class="label">Px</span>${fmtPrice(stock.price, region)}</div>
          <div class="col-trend">
            <span class="label">EPS</span>

          </div>
          <div class="col-trend">
            <span class="label">목표가</span>
            <span class="value"><span class="arrow ${targetTrend.cls}">${targetTrend.arrow}</span>${targetTrend.value}</span>
          </div>

    // ============================================================
    // ETF 행 렌더 (더 간소)
    // ============================================================
    function renderEtfRow(etf) {
      const rsi = etf.rsi !== null && etf.rsi !== undefined ? etf.rsi.toFixed(1) : "—";
      const navDiscount = etf.nav_discount !== null && etf.nav_discount !== undefined 
        ? (etf.nav_discount >= 0 ? "+" : "") + etf.nav_discount.toFixed(2) + "%" 
        : "—";
      const band = etf.band_pct !== null && etf.band_pct !== undefined ? etf.band_pct.toFixed(0) + "%" : "—";
      const vol = etf.vol_ratio !== null && etf.vol_ratio !== undefined ? etf.vol_ratio.toFixed(1) + "x" : "—";
      
      // ETF 시그널: step1 + step2 → 강조
      let rowClass = "";

      if (etf.step1 && etf.step2) {

      } else if (etf.step1) {

      const detailItems = [
        { key: "NAV", val: etf.nav !== null && etf.nav !== undefined ? etf.nav.toLocaleString() : "—" },
        { key: "RSI 임계", val: fmt(etf.rsi_threshold) },
        { key: "거래량", val: etf.volume !== null && etf.volume !== undefined ? etf.volume.toLocaleString() : "—" },

      const detailHtml = detailItems.map(item =>

          <div class="row-detail">
            <div class="detail-grid">${detailHtml}</div>
          </div>
        </div>
      `;
    }
    
    // ============================================================
    // 시그널 우선 정렬
    // ============================================================
    function signalPriority(stock) {
      const triggers = stock.crisis_triggers || [];
      const buyLevel = stock.buy_level || "none";
      const infoLevel = stock.info_level;
      
      if (triggers.length > 0) return 0; // 위기 최상단
      if (buyLevel === "strong") return 1;
      if (buyLevel === "candidate") return 2;
      if (infoLevel === "info_watch") return 3;
      if (infoLevel === "info_warn") return 4;
      if (infoLevel === "info_mild") return 5;
      return 9; // 평상
    }
    
    function sortStocks(list) {
      return [...list].sort((a, b) => {
        const pa = signalPriority(a);
        const pb = signalPriority(b);
        if (pa !== pb) return pa - pb;
        // 동일 우선순위면 RSI 낮은 순 (매수 가까운 종목 우선)
        const ra = a.rsi ?? 100;
        const rb = b.rsi ?? 100;
        return ra - rb;
      });
    }

        ? usList.map(s => renderStockRow(s, "us")).join("")
        : `<div class="empty-state">데이터 없음</div>`;

        ? krList.map(s => renderStockRow(s, "kr")).join("")
        : `<div class="empty-state">데이터 없음</div>`;
      $("#kr-stock-list").innerHTML = krHtml;
      
      // 한국 ETF
      const etfList = data.kr_etf || [];

        ? etfList.map(e => renderEtfRow(e)).join("")
        : `<div class="empty-state">데이터 없음</div>`;
      $("#kr-etf-list").innerHTML = etfHtml;
      
      // 행 클릭 → 확장
      document.querySelectorAll(".stock-row").forEach(row => {
        row.addEventListener("click", () => {
          row.classList.toggle("expanded");
        });
      });
    }

    onSnapshot(dataDoc, (snap) => {
      if (snap.exists()) {
        render(snap.data());

      console.error("Firestore 구독 에러:", err);

      if (!("Notification" in window)) return;
      
      try {
        const reg = await navigator.serviceWorker.register("/firebase-messaging-sw.js");
        messaging = getMessaging(app);
        
        // 포그라운드 알림 처리
        onMessage(messaging, (payload) => {
          console.log("FCM 메시지:", payload);
          // 페이지가 열려있을 때 화면 갱신만 자동으로 됨 (Firestore 구독 중)
        });
        
        // 이전 알림 등록 상태 확인
        if (Notification.permission === "granted") {
          const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
          if (token) {
            markSubscribed();
          }
        }
      } catch (e) {
        console.error("FCM 셋업 에러:", e);
      }
    }
    
    async function subscribeNotification() {
      if (!messaging) {
        alert("알림을 사용할 수 없는 환경이에요.");
        return;
      }
      
      try {
        const permission = await Notification.requestPermission();
        if (permission !== "granted") {
          alert("알림 권한이 거부됐어요.");
          return;
        }
        
        const reg = await navigator.serviceWorker.getRegistration("/firebase-messaging-sw.js");
        const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
        
        if (token) {
          const nickname = prompt("닉네임 (선택)", "재환") || "익명";
          await setDoc(doc(db, "fcm_tokens", token), {
            nickname: nickname.slice(0, 30),
            registered_at: new Date().toISOString(),
          });
          markSubscribed();
          alert("✅ 알림 등록 완료!");
        }
      } catch (e) {
        console.error(e);
        alert("등록 실패: " + e.message);
      }
    }
    
    function markSubscribed() {
      const btn = $("#btn-subscribe");
      btn.classList.add("active");
      btn.textContent = "알림 ON";
    }
    
    $("#btn-subscribe").addEventListener("click", () => {
      if ($("#btn-subscribe").classList.contains("active")) {
        if (confirm("알림을 다시 등록할까요?")) subscribeNotification();
      } else {
        subscribeNotification();
      }
    });
    
    setupMessaging();
    
    // 푸터 상태 표시
    setInterval(() => {
      const dot = $("#footer-status");
      if (dot) dot.style.color = "var(--signal-strong)";
    }, 2000);
    
    </script>
</body>
</html>
