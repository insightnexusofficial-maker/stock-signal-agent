<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사여?! Admin</title>
    <link rel="icon" href="/icon-192.png">
    
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }
        .header-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            overflow: hidden;
        }
        .header-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        h1 {
            font-size: 24px;
            color: #1e293b;
        }
        h1 span {
            font-size: 14px;
            background: #3b82f6;
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .subtitle {
            color: #64748b;
            margin-bottom: 24px;
        }
        .card {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .user-info {
            flex: 1;
            min-width: 150px;
        }
        .nickname {
            font-size: 16px;
            font-weight: 600;
            color: #1e293b;
        }
        .meta {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 4px;
        }
        .status {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .status.pending {
            background: #fef3c7;
            color: #d97706;
        }
        .status.approved {
            background: #dcfce7;
            color: #16a34a;
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn.approve {
            background: #22c55e;
            color: #fff;
        }
        .btn.reject {
            background: #ef4444;
            color: #fff;
        }
        .empty {
            text-align: center;
            padding: 40px;
            color: #64748b;
        }
        .toolbar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 10px 20px;
            background: #fff;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
            cursor: pointer;
            border: none;
        }
        .tab.active {
            background: #3b82f6;
            color: #fff;
        }
        .refresh-btn {
            padding: 10px 16px;
            background: #fff;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-left: auto;
        }
        .refresh-btn:hover {
            background: #f8fafc;
        }
        
        /* 로그인 화면 */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .login-overlay.hidden {
            display: none;
        }
        .login-box {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            width: 90%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .login-box h2 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .login-box p {
            color: #64748b;
            margin-bottom: 24px;
            font-size: 14px;
        }
        .login-box input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 16px;
            outline: none;
            text-align: center;
        }
        .login-box input:focus {
            border-color: #3b82f6;
        }
        .login-box .btn-login {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .login-error {
            color: #ef4444;
            font-size: 14px;
            margin-top: 12px;
            display: none;
        }
        .login-error.show {
            display: block;
        }
        
        /* 메인 컨텐츠 */
        .main-content {
            display: none;
        }
        .main-content.show {
            display: block;
        }
        
        .stats {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .stat-card {
            flex: 1;
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
        }
        .stat-label {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        
        .top-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 20px;
        }
        .logout-btn {
            padding: 8px 16px;
            background: #64748b;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #475569;
        }
    </style>
</head>
<body>
    <!-- 로그인 화면 -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-box">
            <h2>🐜 관리자 로그인</h2>
            <p>사여?! 어드민 페이지입니다</p>
            <input type="password" id="passwordInput" placeholder="비밀번호 입력" onkeypress="if(event.key==='Enter')attemptLogin()">
            <button class="btn-login" onclick="attemptLogin()">로그인</button>
            <p class="login-error" id="loginError">비밀번호가 틀렸습니다</p>
        </div>
    </div>
    
    <!-- 메인 컨텐츠 -->
    <div class="main-content" id="mainContent">
        <div class="container">
            <div class="top-bar">
                <button class="logout-btn" onclick="logout()">로그아웃</button>
            </div>
            
            <div class="header">
                <div class="header-icon">
                    <img src="/icon-192.png" alt="사여?!">
                </div>
                <h1>사여?! <span>Admin</span></h1>
            </div>
            <p class="subtitle">개미 알림 서비스 승인 관리</p>
            
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="statPending">0</div>
                    <div class="stat-label">대기중</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statApproved">0</div>
                    <div class="stat-label">승인됨</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">전체</div>
                </div>
            </div>
            
            <div class="toolbar">
                <button class="tab active" onclick="showTab('pending', this)">대기중</button>
                <button class="tab" onclick="showTab('approved', this)">승인됨</button>
                <button class="tab" onclick="showTab('all', this)">전체</button>
                <button class="refresh-btn" onclick="loadUsers()">🔄 새로고침</button>
            </div>
            
            <div id="userList">
                <div class="empty">로딩 중...</div>
            </div>
        </div>
    </div>
    
    <script>
        // ⚠️ 비밀번호 설정
        const ADMIN_PASSWORD = "insight01!!";
        
        // 세션 체크 - localStorage 사용 (브라우저 닫아도 유지)
        function checkSession() {
            const isLoggedIn = localStorage.getItem('admin_logged_in');
            if (isLoggedIn === 'true') {
                showMainContent();
            }
        }
        
        function attemptLogin() {
            const input = document.getElementById('passwordInput').value;
            if (input === ADMIN_PASSWORD) {
                localStorage.setItem('admin_logged_in', 'true');
                showMainContent();
            } else {
                document.getElementById('loginError').classList.add('show');
                document.getElementById('passwordInput').value = '';
            }
        }
        
        function showMainContent() {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainContent').classList.add('show');
            loadUsers();
        }
        
        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                localStorage.removeItem('admin_logged_in');
                location.reload();
            }
        }
        
        // Firebase 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyALQUtr9qGDdoqj-Jdwrkw3XQpxBuQ7joQ",
            authDomain: "stock-sayo.firebaseapp.com",
            projectId: "stock-sayo",
            storageBucket: "stock-sayo.firebasestorage.app",
            messagingSenderId: "964666304071",
            appId: "1:964666304071:web:0c806002d44229f71e3362"
        };
        firebase.initializeApp(firebaseConfig);
        
        const db = firebase.firestore();
        let allUsers = [];
        let currentTab = 'pending';
        
        async function loadUsers() {
            document.getElementById('userList').innerHTML = '<div class="empty">로딩 중...</div>';
            
            const snapshot = await db.collection('fcm_tokens').orderBy('createdAt', 'desc').get();
            allUsers = [];
            snapshot.forEach(doc => {
                allUsers.push({ id: doc.id, ...doc.data() });
            });
            updateStats();
            renderUsers();
        }
        
        function updateStats() {
            const pending = allUsers.filter(u => !u.approved).length;
            const approved = allUsers.filter(u => u.approved).length;
            document.getElementById('statPending').textContent = pending;
            document.getElementById('statApproved').textContent = approved;
            document.getElementById('statTotal').textContent = allUsers.length;
        }
        
        function showTab(tab, el) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderUsers();
        }
        
        function renderUsers() {
            let filtered = allUsers;
            if (currentTab === 'pending') {
                filtered = allUsers.filter(u => !u.approved);
            } else if (currentTab === 'approved') {
                filtered = allUsers.filter(u => u.approved);
            }
            
            if (filtered.length === 0) {
                document.getElementById('userList').innerHTML = '<div class="empty">사용자가 없습니다</div>';
                return;
            }
            
            let html = '';
            filtered.forEach(user => {
                const date = user.createdAt ? new Date(user.createdAt.seconds * 1000).toLocaleString('ko-KR') : '-';
                const statusClass = user.approved ? 'approved' : 'pending';
                const statusText = user.approved ? '승인됨' : '대기중';
                
                html += `
                    <div class="card">
                        <div class="user-info">
                            <div class="nickname">${user.nickname || '(이름없음)'}</div>
                            <div class="meta">${user.platform || '-'} · ${date}</div>
                        </div>
                        <span class="status ${statusClass}">${statusText}</span>
                        <div class="actions">
                            ${!user.approved ? `<button class="btn approve" onclick="approveUser('${user.id}')">승인</button>` : ''}
                            <button class="btn reject" onclick="deleteUser('${user.id}')">삭제</button>
                        </div>
                    </div>
                `;
            });
            
            document.getElementById('userList').innerHTML = html;
        }
        
        async function approveUser(id) {
            await db.collection('fcm_tokens').doc(id).update({ approved: true });
            loadUsers();
        }
        
        async function deleteUser(id) {
            if (confirm('정말 삭제하시겠습니까?')) {
                await db.collection('fcm_tokens').doc(id).delete();
                loadUsers();
            }
        }
        
        // 초기화
        checkSession();
    </script>
</body>
</html>
